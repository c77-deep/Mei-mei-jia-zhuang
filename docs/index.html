    <script>
        async function loadHotProducts() {
            const result = await api.getHotProducts();
            const container = document.getElementById('hotProducts');

            if (result.success && result.data.length > 0) {
                container.innerHTML = result.data.slice(0, 8).map(p => `
                    <a href="pages/product-detail.html?id=${p.id}" class="product-card" style="text-decoration:none;color:inherit;">
                        <div class="product-image">${getCategoryIcon(p.category)}</div>
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">${p.price}</div>
                            <div class="product-meta">
                                <span>${p.brand}</span>
                                <span>${p.sales}人付款</span>
                            </div>
                        </div>
                    </a>
                `).join('');
            } else {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><p>暂无商品</p></div>';
            }
        }

        function search() {
            const keyword = document.getElementById('searchInput').value;
            if (keyword) {
                window.location.href = `pages/products.html?keyword=${encodeURIComponent(keyword)}`;
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });

        function updateUserBtn() {
            const btn = document.getElementById('userBtn');
            const user = getUser();
            if (user) {
                btn.textContent = user.nickname || user.username;
                btn.href = 'pages/profile.html';
            } else {
                btn.textContent = '快速体验';
                btn.href = 'pages/profile.html';
            }
        }

        // 页面加载时自动创建临时用户
        if (!isLoggedIn()) {
            quickLogin();
        }

        loadHotProducts();
        updateUserBtn();
        api.initData();
    </script>
