<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布需求 - 美家家装</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 10px 0;
        }
        .upload-box {
            border: 2px dashed var(--primary);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            color: var(--text-lighter);
            background: var(--primary-light);
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-box:hover {
            background: #ffe5d5;
        }
        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="../index.html" class="header-back">← 返回</a>
        <div class="header-title">发布装修需求</div>
        <div style="width: 50px;"></div>
    </div>

    <div class="page-content p-15">
        <div class="card">
            <div class="section-title">📷 上传户型图</div>
            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📸</div>
                <div>点击上传户型图</div>
                <div style="font-size:13px;margin-top:5px;">支持 JPG、PNG 格式</div>
            </div>
            <input type="file" id="fileInput" style="display:none" accept="image/*" multiple>
        </div>

        <div class="card">
            <div class="section-title">🏠 房屋信息</div>
            <div class="form-group">
                <label class="form-label">房屋类型</label>
                <div class="tag-group" id="houseType">
                    <span class="tag" onclick="toggleTag(this)">新房装修</span>
                    <span class="tag" onclick="toggleTag(this)">二手房翻新</span>
                    <span class="tag" onclick="toggleTag(this)">局部改造</span>
                    <span class="tag" onclick="toggleTag(this)">别墅装修</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">建筑面积（平方米）</label>
                <input type="number" class="form-input" id="area" placeholder="请输入面积">
            </div>
            <div class="form-group">
                <label class="form-label">所在城市</label>
                <input type="text" class="form-input" id="city" placeholder="请输入城市/区域">
            </div>
        </div>

        <div class="card">
            <div class="section-title">🎨 装修风格</div>
            <div class="form-group">
                <label class="form-label">喜欢的风格（可多选）</label>
                <div class="tag-group" id="styleGroup">
                    <span class="tag" onclick="toggleTag(this)">现代简约</span>
                    <span class="tag" onclick="toggleTag(this)">北欧风</span>
                    <span class="tag" onclick="toggleTag(this)">新中式</span>
                    <span class="tag" onclick="toggleTag(this)">轻奢风</span>
                    <span class="tag" onclick="toggleTag(this)">日式原木</span>
                    <span class="tag" onclick="toggleTag(this)">美式田园</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">装修方式</label>
                <select class="form-input" id="decoType">
                    <option value="">请选择</option>
                    <option value="全包">全包（设计+材料+施工）</option>
                    <option value="半包">半包（设计+施工，自购主材）</option>
                    <option value="清包">清包（只施工）</option>
                    <option value="仅设计">仅设计</option>
                </select>
            </div>
        </div>

        <div class="card">
            <div class="section-title">💰 预算与工期</div>
            <div class="form-group">
                <label class="form-label">装修预算</label>
                <input type="text" class="form-input" id="budget" placeholder="如：15-20万">
            </div>
        </div>

        <div class="card">
            <div class="section-title">📝 补充需求</div>
            <div class="form-group">
                <textarea class="form-input" id="description" rows="5" placeholder="详细描述您的需求：&#10;- 家庭人口情况&#10;- 特殊功能需求（如：书房、儿童房）&#10;- 品牌偏好&#10;- 其他要求"></textarea>
            </div>
        </div>

        <button class="btn btn-primary btn-block mt-20" onclick="submitDemand()">✅ 发布需求</button>
        <div style="height: 30px;"></div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        function toggleTag(el) {
            el.classList.toggle('active');
        }

        function getSelectedTags(containerId) {
            return Array.from(document.querySelectorAll(`#${containerId} .tag.active`))
                .map(t => t.textContent)
                .join(',');
        }

        async function submitDemand() {
            if (!isLoggedIn()) {
                showToast('请先登录');
                setTimeout(() => window.location.href = 'login.html', 1000);
                return;
            }

            const houseType = getSelectedTags('houseType');
            const area = document.getElementById('area').value;
            const city = document.getElementById('city').value;
            const style = getSelectedTags('styleGroup');
            const decoType = document.getElementById('decoType').value;
            const budget = document.getElementById('budget').value;
            const description = document.getElementById('description').value;

            if (!houseType) {
                showToast('请选择房屋类型');
                return;
            }

            if (!area) {
                showToast('请填写面积');
                return;
            }

            const result = await api.createDemand({
                houseType,
                area: parseInt(area),
                city,
                style,
                decorationType: decoType,
                budget,
                description
            });

            if (result.success) {
                showToast('需求发布成功！');
                setTimeout(() => window.location.href = '../index.html', 1500);
            } else {
                showToast(result.message || '发布失败');
            }
        }
    </script>
</body>
</html>
