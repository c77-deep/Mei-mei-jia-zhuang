<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 美家家装</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-page {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary), #ff8c00);
            padding: 60px 20px 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .login-logo {
            text-align: center;
            font-size: 60px;
            margin-bottom: 20px;
        }
        .login-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 30px;
        }
        .login-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
        }
        .login-tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            color: var(--text-light);
            font-size: 16px;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: 0.3s;
        }
        .login-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: bold;
        }
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
        .login-footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-lighter);
            font-size: 14px;
        }
        .login-footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">🏠</div>
            <div class="login-title">美家家装</div>

            <div class="login-tabs">
                <div class="login-tab active" onclick="switchTab('login')">登录</div>
                <div class="login-tab" onclick="switchTab('register')">注册</div>
            </div>

            <div id="loginForm" class="form-section active">
                <div class="form-group">
                    <label class="form-label">用户名/手机号</label>
                    <input type="text" class="form-input" id="loginUsername" placeholder="请输入用户名或手机号">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码">
                </div>
                <button class="btn btn-primary btn-block" onclick="doLogin()">登 录</button>
            </div>

            <div id="registerForm" class="form-section">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="regUsername" placeholder="请设置用户名">
                </div>
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" id="regPhone" placeholder="请输入手机号">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="regPassword" placeholder="请设置密码">
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <input type="password" class="form-input" id="regConfirm" placeholder="请再次输入密码">
                </div>
                <button class="btn btn-primary btn-block" onclick="doRegister()">注 册</button>
            </div>

            <div class="login-footer">
                登录即表示同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));

            if (tab === 'login') {
                document.querySelector('.login-tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.login-tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        async function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showToast('请填写完整信息');
                return;
            }

            const result = await api.login(username, password);
            if (result.success) {
                saveAuth(result.token, result.user);
                showToast('登录成功');
                setTimeout(() => window.location.href = '../index.html', 1000);
            } else {
                showToast(result.message);
            }
        }

        async function doRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            if (!username || !phone || !password) {
                showToast('请填写完整信息');
                return;
            }

            if (password !== confirm) {
                showToast('两次密码不一致');
                return;
            }

            if (password.length < 6) {
                showToast('密码至少6位');
                return;
            }

            const result = await api.register(username, phone, password);
            if (result.success) {
                saveAuth(result.token, result.user);
                showToast('注册成功');
                setTimeout(() => window.location.href = '../index.html', 1000);
            } else {
                showToast(result.message);
            }
        }

        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    if (document.getElementById('loginForm').classList.contains('active')) {
                        doLogin();
                    } else {
                        doRegister();
                    }
                }
            });
        });
    </script>
</body>
</html>
